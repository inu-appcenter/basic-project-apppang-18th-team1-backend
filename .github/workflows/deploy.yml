name: Deploy Appang Backend

on:
  push:
    branches:
      - main
jobs:
  build-and-deploy: #jobs 이름
    runs-on: ubuntu-latest #운영체제
    services: #돌릴 서비스 컨테이너(도커는 깃허브 액션에서 자동 제공)
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: appang
          MYSQL_USER: appang
          MYSQL_PASSWORD: appangpass
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          
    steps: #jobs 순서
        - name: 코드 체크아웃
          uses: actions/checkout@v4 #깃허브 제공 액션, 레포를 우분투에 가져온다(체크아웃)

        - name: JDK 21 설치
          uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'

        - name: Gradle 실행 권한 부여
          run: chmod +x ./gradlew

        - name: MySQL 연결 확인
          run: |
            for i in {1..15}; do
              mysqladmin ping -h 127.0.0.1 -P 3307 -u appang -pappangpass --silent && echo "MySQL 준비 완료!" && break
              echo "MySQL 대기 중... ($i/15)"
              sleep 3
            done
            

        - name: Gradle 빌드
          run: ./gradlew build -Dspring.profiles.active=local


        - name: Docker Hub 로그인
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Docker 이미지 빌드 및 푸시
          uses: docker/build-push-action@v5
          with:
            context: .
            push: true
            tags: cshoney/appang-backend:latest #도커 허브 이미지 태그

        - name: EC2에 배포
          uses: appleboy/ssh-action@v1 #SSH 접속 액션
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ubuntu
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              cd appang
              docker compose -f docker-compose.prod.yml pull
              docker compose -f docker-compose.prod.yml up -d
